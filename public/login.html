<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobFinder AI — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f172a; --surface:#1e293b; --border:#334155;
      --accent:#6366f1; --accent-h:#818cf8; --green:#22c55e; --red:#ef4444;
      --text:#f1f5f9; --muted:#94a3b8; --faint:#64748b;
    }
    body {
      font-family: system-ui,-apple-system,sans-serif;
      background:var(--bg); color:var(--text); min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(99,102,241,.18) 0%,transparent 70%);
    }
    .card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:40px; width:100%; max-width:460px;
      box-shadow:0 20px 60px rgba(0,0,0,.5); margin:20px;
    }
    .logo { text-align:center; margin-bottom:28px; }
    .logo h1 {
      font-size:26px; font-weight:800;
      background:linear-gradient(135deg,#a5b4fc,#6366f1,#22d3ee);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .logo p { color:var(--muted); font-size:13px; margin-top:4px; }
    .tabs { display:flex; background:#0f172a; border-radius:10px; padding:4px; margin-bottom:24px; }
    .tab {
      flex:1; padding:9px; text-align:center; font-size:14px; font-weight:600;
      cursor:pointer; border-radius:8px; color:var(--faint);
      border:none; background:none; transition:background .2s, color .2s;
    }
    .tab.active { background:var(--accent); color:#fff; }
    .form { display:none; flex-direction:column; gap:14px; }
    .form.active { display:flex; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .field { display:flex; flex-direction:column; gap:5px; }
    .field label { font-size:12px; font-weight:600; color:var(--muted); }
    .field input, .field select {
      background:#0f172a; border:1px solid var(--border);
      color:var(--text); border-radius:8px; padding:10px 12px; font-size:14px;
      transition:border-color .2s;
    }
    .field input:focus, .field select:focus { outline:none; border-color:var(--accent); }
    .field input::placeholder { color:var(--faint); }
    .phone-row { display:flex; gap:8px; }
    .phone-row select { width:140px; flex-shrink:0; }
    .phone-row input { flex:1; }
    .err { color:var(--red); font-size:12px; display:none; }
    .err.show { display:block; }
    .btn {
      width:100%; padding:13px; background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700;
      cursor:pointer; transition:opacity .2s; margin-top:4px;
    }
    .btn:hover { opacity:.88; }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .divider { text-align:center; color:var(--faint); font-size:13px; }
    .msg { padding:10px 14px; border-radius:8px; font-size:13px; display:none; margin-bottom:4px; }
    .msg.success { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.3); color:#86efac; display:block; }
    .msg.error   { background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.3);  color:#fca5a5; display:block; }
    .strength { height:4px; border-radius:2px; margin-top:4px; background:var(--border); overflow:hidden; }
    .strength-bar { height:100%; border-radius:2px; transition:width .3s, background .3s; width:0; }
    select option { background:#1e293b; }
    .hint { font-size:11px; color:var(--faint); margin-top:2px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🔍 JobFinder AI</h1>
    <p>AI-powered job search across 13+ portals</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('register')">Create Account</button>
  </div>

  <div id="msgBox" class="msg"></div>

  <!-- LOGIN -->
  <form class="form active" id="loginForm" onsubmit="doLogin(event)">
    <div class="field">
      <label>Email or Username</label>
      <input type="text" id="lEmail" placeholder="you@example.com or admin" required autocomplete="username" />
      <span class="hint">Use "admin" for admin access</span>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="lPass" placeholder="••••••••" required autocomplete="current-password" />
    </div>
    <span class="err" id="loginErr">Invalid email or password.</span>
    <button class="btn" type="submit" id="loginBtn">Sign In</button>
    <div class="divider">New here? <a href="#" onclick="switchTab('register')" style="color:var(--accent-h)">Create account</a></div>
  </form>

  <!-- REGISTER -->
  <form class="form" id="registerForm" onsubmit="doRegister(event)">
    <div class="row2">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="rFirst" placeholder="John" required />
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="rLast" placeholder="Doe" required />
      </div>
    </div>
    <div class="field">
      <label>Phone Number</label>
      <div class="phone-row">
        <select id="rCC">
          <option value="+1">🇺🇸 +1</option><option value="+1-CA">🇨🇦 +1</option>
          <option value="+44">🇬🇧 +44</option><option value="+91">🇮🇳 +91</option>
          <option value="+61">🇦🇺 +61</option><option value="+64">🇳🇿 +64</option>
          <option value="+65">🇸🇬 +65</option><option value="+60">🇲🇾 +60</option>
          <option value="+63">🇵🇭 +63</option><option value="+62">🇮🇩 +62</option>
          <option value="+66">🇹🇭 +66</option><option value="+84">🇻🇳 +84</option>
          <option value="+86">🇨🇳 +86</option><option value="+81">🇯🇵 +81</option>
          <option value="+82">🇰🇷 +82</option><option value="+92">🇵🇰 +92</option>
          <option value="+880">🇧🇩 +880</option><option value="+94">🇱🇰 +94</option>
          <option value="+971">🇦🇪 +971</option><option value="+966">🇸🇦 +966</option>
          <option value="+974">🇶🇦 +974</option><option value="+965">🇰🇼 +965</option>
          <option value="+972">🇮🇱 +972</option><option value="+90">🇹🇷 +90</option>
          <option value="+20">🇪🇬 +20</option><option value="+27">🇿🇦 +27</option>
          <option value="+234">🇳🇬 +234</option><option value="+254">🇰🇪 +254</option>
          <option value="+49">🇩🇪 +49</option><option value="+33">🇫🇷 +33</option>
          <option value="+39">🇮🇹 +39</option><option value="+34">🇪🇸 +34</option>
          <option value="+31">🇳🇱 +31</option><option value="+46">🇸🇪 +46</option>
          <option value="+47">🇳🇴 +47</option><option value="+41">🇨🇭 +41</option>
          <option value="+7">🇷🇺 +7</option><option value="+55">🇧🇷 +55</option>
          <option value="+52">🇲🇽 +52</option><option value="+54">🇦🇷 +54</option>
          <option value="+57">🇨🇴 +57</option>
        </select>
        <input type="tel" id="rPhone" placeholder="555-123-4567" />
      </div>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="rEmail" placeholder="you@example.com" required autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="rPass" placeholder="Min 8 characters" required oninput="checkStrength(this.value)" />
      <div class="strength"><div class="strength-bar" id="sBar"></div></div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="rPass2" placeholder="Repeat password" required />
    </div>
    <span class="err" id="regErr"></span>
    <button class="btn" type="submit" id="regBtn">Create Account</button>
    <div class="divider">Have an account? <a href="#" onclick="switchTab('login')" style="color:var(--accent-h)">Sign in</a></div>
  </form>
</div>

<script>
const GW = 'HMDA899CwJOrPICTLxa3r0ujxcmLx2Hm';

// Redirect if already logged in
try {
  const s = JSON.parse(localStorage.getItem('jf_token_data') || 'null');
  if (s && s.token && Date.now() - s.ts < 7 * 24 * 60 * 60 * 1000)
    window.location.href = '/';
} catch {}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', tab==='login'?i===0:i===1));
  document.getElementById('loginForm').classList.toggle('active', tab==='login');
  document.getElementById('registerForm').classList.toggle('active', tab==='register');
  document.getElementById('msgBox').className = 'msg';
}

function showMsg(type, text) {
  const el = document.getElementById('msgBox');
  el.className = 'msg ' + type;
  el.textContent = text;
}

async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  const btn   = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginErr');
  errEl.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-gateway-token': GW },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await resp.json();
    if (!resp.ok) { errEl.textContent = data.error || 'Login failed'; errEl.classList.add('show'); return; }

    localStorage.setItem('jf_token_data', JSON.stringify({ token: data.token, name: data.name, email: data.email, isAdmin: data.isAdmin, ts: Date.now() }));
    showMsg('success', `Welcome back, ${data.name}! Redirecting…`);
    setTimeout(() => { window.location.href = data.isAdmin ? '/admin.html' : '/'; }, 700);
  } catch (err) {
    errEl.textContent = 'Network error. Please try again.';
    errEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doRegister(e) {
  e.preventDefault();
  const firstName   = document.getElementById('rFirst').value.trim();
  const lastName    = document.getElementById('rLast').value.trim();
  const countryCode = document.getElementById('rCC').value;
  const phone       = document.getElementById('rPhone').value.trim();
  const email       = document.getElementById('rEmail').value.trim();
  const pass        = document.getElementById('rPass').value;
  const pass2       = document.getElementById('rPass2').value;
  const btn         = document.getElementById('regBtn');
  const errEl       = document.getElementById('regErr');
  errEl.classList.remove('show');

  if (pass !== pass2)  { errEl.textContent = 'Passwords do not match.'; errEl.classList.add('show'); return; }
  if (pass.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.classList.add('show'); return; }

  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const resp = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-gateway-token': GW },
      body: JSON.stringify({ firstName, lastName, email, password: pass, countryCode, phone })
    });
    const data = await resp.json();
    if (!resp.ok) { errEl.textContent = data.error || 'Registration failed'; errEl.classList.add('show'); return; }

    localStorage.setItem('jf_token_data', JSON.stringify({ token: data.token, name: data.name, email: data.email, isAdmin: data.isAdmin, ts: Date.now() }));
    showMsg('success', `Account created! Welcome, ${firstName}! Redirecting…`);
    setTimeout(() => { window.location.href = '/'; }, 800);
  } catch (err) {
    errEl.textContent = 'Network error. Please try again.';
    errEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

function checkStrength(pw) {
  let s = 0;
  if (pw.length >= 8) s++; if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw)) s++; if (/[0-9]/.test(pw)) s++; if (/[^A-Za-z0-9]/.test(pw)) s++;
  const bar = document.getElementById('sBar');
  bar.style.width = (s * 20) + '%';
  bar.style.background = ['','#ef4444','#f59e0b','#f59e0b','#22c55e','#22c55e'][s] || '';
}
</script>
</body>
</html>
